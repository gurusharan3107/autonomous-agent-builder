name: Documentation Freshness

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: documentation-freshness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  documentation-freshness:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install builder CLI
        run: pip install -e .

      - name: Ensure local main ref exists
        run: git fetch origin main:main

      - name: Run deterministic knowledge validation
        run: builder knowledge validate --json > kb-validate.json

      - name: Run documentation-agent bridge
        id: documentation_bridge
        continue-on-error: true
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: builder agent documentation-refresh --validation kb-validate.json --json > documentation-refresh.json

      - name: Upload documentation freshness evidence
        uses: actions/upload-artifact@v4
        with:
          name: documentation-freshness-evidence
          path: |
            kb-validate.json
            documentation-refresh.json

      - name: Fail when the documentation-agent bridge reports a bounded gap
        if: steps.documentation_bridge.outcome != 'success'
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path("documentation-refresh.json").read_text(encoding="utf-8"))
          raise SystemExit(payload.get("summary", "Documentation-agent bridge failed."))
          PY

      - name: Re-run deterministic validation after documentation-agent bridge
        run: builder knowledge validate --json > kb-validate-post.json

      - name: Fail if canonical validation does not pass after the bridge
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path("kb-validate-post.json").read_text(encoding="utf-8"))
          if not payload.get("passed", False):
              raise SystemExit(payload.get("summary", "Post-refresh knowledge validation failed."))
          print(payload.get("summary", "Post-refresh knowledge validation passed."))
          PY

      - name: Create follow-up PR for documentation refresh
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/documentation-freshness-${{ github.run_id }}
          commit-message: "Refresh maintained docs after main push"
          title: "Refresh maintained docs after main push"
          body: |
            The repo-owned documentation-agent bridge handled bounded maintained-doc freshness gaps after a push to `main`.

            Trigger summary:
            - See `documentation-refresh.json` in the workflow artifacts for the bridge summary and targeted docs.

            This PR was generated by the canonical documentation-freshness workflow:
            1. run deterministic freshness validation
            2. invoke the repo-owned `builder agent documentation-refresh` bridge
            3. rerun deterministic validation before opening the PR
          delete-branch: true
